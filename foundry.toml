[profile.default]
src = 'contracts'
out = 'out'
libs = ["lib"]
remappings = [
    '@openzeppelin/contracts/=./@openzeppelin/contracts/',
    '@openzeppelin/contracts-upgradeable/=./@openzeppelin/contracts-upgradeable/',
    '@chainlink/contracts-ccip/=./@chainlink/contracts-ccip/'
]
solc_version = '0.8.24'
optimizer = true
optimizer_runs = 10000
evm_version = 'cancun'
# vyper = "vyper"